apiVersion: apps/v1
kind: Deployment
metadata:
  name: termai-cicd
  namespace: term-ai
  labels:
    app: termai-cicd
spec:
  replicas: 1
  selector:
    matchLabels:
      app: termai-cicd
  template:
    metadata:
      labels:
        app: termai-cicd
    spec:
      containers:
        - name: termai-cicd
          image: mingcsiro/termai-cicd:v0.2.3
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8101
              name: http
          env:
            - name: APP_ENV
              value: "production"
            - name: LOG_LEVEL
              value: "info"
            - name: TZ
              value: "UTC"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
