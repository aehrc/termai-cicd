apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: termai-cicd
  namespace: ${NAMESPACE}
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
    - host: ${INGRESS_HOST}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: termai-cicd
                port:
                  number: 80
